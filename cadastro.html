<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <title>Monster High Shop</title>

    <!--VUE CDN-->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- STYLE -->
    <link rel="stylesheet" href="assets/style.css">

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

</head>

<body>
    <div id="app">
        <header class="header">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="">
            </a>
        </header>
    </div>
    <form>
        <div class="login-screen">
          <p class="title">Cadastre-se!</p>
          <div class="login-screen-content">
            <label for="nome">Nome</label>
            <input id="nome" type="text" />
      
            <label for="email">Email</label>
            <input id="email" type="email" />
      
            <label for="senha">Senha</label>
            <input id="senha" type="password" />
      
            <label for="confirma-senha">Confirme sua senha</label>
            <input id="confirma-senha" type="password" />
      
            <button type="submit" class="button-css">Cadastrar</button>
          </div>
        </div>
      </form>
</body>

</html>
